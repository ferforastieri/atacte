services:
  postgres:
    image: postgres:15-alpine
    container_name: atacte-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atacte}
      POSTGRES_USER: ${POSTGRES_USER:-atacte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atacte-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atacte} -d ${POSTGRES_DB:-atacte}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: atacte-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-atacte}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-atacte}?sslmode=disable
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-500}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Atacte}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-}
    ports:
      - "${BACKEND_PORT:-3457}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atacte-network

  front:
    build:
      context: .
      dockerfile: Dockerfile.front
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: atacte-front
    restart: unless-stopped
    ports:
      - "${FRONT_PORT:-3456}:80"
    depends_on:
      - backend
    networks:
      - atacte-network

networks:
  atacte-network:
    driver: bridge

volumes:
  postgres_data:

name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build and deploy on this server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Docker CLI
        run: |
          set -eu
          if command -v docker >/dev/null 2>&1; then
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y docker.io
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache docker-cli
          else
            echo "Docker CLI is not installed in the runner image"
            exit 1
          fi

      - name: Validate required secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -eu
          test -n "$POSTGRES_PASSWORD" || { echo "Missing secret POSTGRES_PASSWORD"; exit 1; }
          test -n "$JWT_SECRET" || { echo "Missing secret JWT_SECRET"; exit 1; }
          test -n "$ENCRYPTION_KEY" || { echo "Missing secret ENCRYPTION_KEY"; exit 1; }
          test -n "$VITE_API_URL" || { echo "Missing secret VITE_API_URL"; exit 1; }
          test -n "$EXPO_TOKEN" || { echo "Missing secret EXPO_TOKEN"; exit 1; }

      - name: Create deploy environment
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONT_PORT: ${{ secrets.FRONT_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          BCRYPT_ROUNDS: ${{ secrets.BCRYPT_ROUNDS }}
          RATE_LIMIT_WINDOW_MS: ${{ secrets.RATE_LIMIT_WINDOW_MS }}
          RATE_LIMIT_MAX_REQUESTS: ${{ secrets.RATE_LIMIT_MAX_REQUESTS }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          PASSWORD_RESET_URL: ${{ secrets.PASSWORD_RESET_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -eu
          umask 077
          {
            printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB:-atacte}"
            printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER:-atacte}"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_PORT=%s\n' "${POSTGRES_PORT:-5435}"
            printf 'BACKEND_PORT=%s\n' "${BACKEND_PORT:-3457}"
            printf 'FRONT_PORT=%s\n' "${FRONT_PORT:-3456}"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'JWT_EXPIRES_IN=%s\n' "${JWT_EXPIRES_IN:-7d}"
            printf 'ENCRYPTION_KEY=%s\n' "$ENCRYPTION_KEY"
            printf 'BCRYPT_ROUNDS=%s\n' "${BCRYPT_ROUNDS:-12}"
            printf 'RATE_LIMIT_WINDOW_MS=%s\n' "${RATE_LIMIT_WINDOW_MS:-900000}"
            printf 'RATE_LIMIT_MAX_REQUESTS=%s\n' "${RATE_LIMIT_MAX_REQUESTS:-500}"
            printf 'CORS_ORIGIN=%s\n' "${CORS_ORIGIN:-*}"
            printf 'LOG_LEVEL=%s\n' "${LOG_LEVEL:-info}"
            printf 'SMTP_HOST=%s\n' "${SMTP_HOST:-}"
            printf 'SMTP_PORT=%s\n' "${SMTP_PORT:-587}"
            printf 'SMTP_USER=%s\n' "${SMTP_USER:-}"
            printf 'SMTP_PASS=%s\n' "${SMTP_PASS:-}"
            printf 'EMAIL_FROM=%s\n' "${EMAIL_FROM:-}"
            printf 'EMAIL_FROM_NAME=%s\n' "${EMAIL_FROM_NAME:-Atacte}"
            printf 'PASSWORD_RESET_URL=%s\n' "${PASSWORD_RESET_URL:-}"
            printf 'VITE_API_URL=%s\n' "$VITE_API_URL"
          } > .env

      - name: Deploy containers
        run: |
          set -eu
          export DOCKER_CONFIG="$PWD/.docker"
          mkdir -p "$DOCKER_CONFIG"

          if docker compose version >/dev/null 2>&1 && docker compose --env-file .env -f docker-compose.yml config >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1 && docker-compose --env-file .env -f docker-compose.yml config >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose is not configured in the runner/server"
            exit 1
          fi

          export COMPOSE_PROJECT_NAME=atacte
          $COMPOSE --env-file .env build --pull
          $COMPOSE --env-file .env up -d postgres
          $COMPOSE --env-file .env run --rm backend npm run db:push
          $COMPOSE --env-file .env up -d
          $COMPOSE --env-file .env ps

      - name: Set up Node for EAS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Trigger Expo production build
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
        run: |
          set -eu
          npm ci
          npx --yes eas-cli@21.0.2 build \
            --platform android \
            --profile production \
            --non-interactive \
            --no-wait

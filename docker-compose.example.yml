services:
  postgres:
    image: postgres:15-alpine
    container_name: atacte-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atacte
      POSTGRES_USER: atacte_usuario
      POSTGRES_PASSWORD: sua_senha_postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atacte-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atacte_usuario -d atacte"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: atacte-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://atacte_usuario:sua_senha_postgres@postgres:5432/atacte?sslmode=disable
      CORS_ORIGIN: "*"
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3457:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atacte-network

  front:
    build:
      context: .
      dockerfile: Dockerfile.front
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3457/api}
    container_name: atacte-front
    restart: unless-stopped
    ports:
      - "3456:80"
    depends_on:
      - backend
    networks:
      - atacte-network

networks:
  atacte-network:
    driver: bridge

volumes:
  postgres_data:
